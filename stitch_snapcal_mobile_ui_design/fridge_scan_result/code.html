<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .ambient-shadow {
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.04);
        }
        .elevated-shadow {
            box-shadow: 0 8px 24px 0 rgba(0, 0, 0, 0.08);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- Main Canvas -->
<main class="flex-1 flex flex-col px-grid-margin pt-12 pb-32">
<!-- Header -->
<header class="mb-8">
<button aria-label="Go back" class="mb-6 text-on-surface-variant flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-low hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg text-on-surface">What's in your fridge</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">We identified these ingredients from your snap.</p>
</header>
<!-- Detected Ingredients Section -->
<section class="mb-8 flex-1">
<div class="flex justify-between items-center mb-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Detected</h2>
<button class="flex items-center gap-1 text-primary font-label-caps text-label-caps bg-surface-container-low px-3 py-1.5 rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">edit</span>
                    Edit
                </button>
</div>
<!-- Horizontal Scrollable Pills -->
<div class="flex overflow-x-auto gap-stack-gap-sm pb-6 snap-x hide-scrollbar -mx-grid-margin px-grid-margin">
<!-- Pill 1 -->
<div class="snap-start shrink-0 bg-surface-container-lowest rounded-full px-5 py-3 flex items-center gap-2 ambient-shadow border border-surface-container-high">
<div class="w-2 h-2 rounded-full bg-[#E53935]"></div>
<span class="font-body-lg text-body-lg text-on-surface">Tomato</span>
</div>
<!-- Pill 2 -->
<div class="snap-start shrink-0 bg-surface-container-lowest rounded-full px-5 py-3 flex items-center gap-2 ambient-shadow border border-surface-container-high">
<div class="w-2 h-2 rounded-full bg-[#FFF59D]"></div>
<span class="font-body-lg text-body-lg text-on-surface">Paneer</span>
</div>
<!-- Pill 3 -->
<div class="snap-start shrink-0 bg-surface-container-lowest rounded-full px-5 py-3 flex items-center gap-2 ambient-shadow border border-surface-container-high">
<div class="w-2 h-2 rounded-full bg-[#FFFFFF] border border-surface-variant"></div>
<span class="font-body-lg text-body-lg text-on-surface">Dahi</span>
</div>
<!-- Pill 4 -->
<div class="snap-start shrink-0 bg-surface-container-lowest rounded-full px-5 py-3 flex items-center gap-2 ambient-shadow border border-surface-container-high">
<div class="w-2 h-2 rounded-full bg-[#CE93D8]"></div>
<span class="font-body-lg text-body-lg text-on-surface">Onion</span>
</div>
<!-- Pill 5 -->
<div class="snap-start shrink-0 bg-surface-container-lowest rounded-full px-5 py-3 flex items-center gap-2 ambient-shadow border border-surface-container-high">
<div class="w-2 h-2 rounded-full bg-[#4CAF50]"></div>
<span class="font-body-lg text-body-lg text-on-surface">Capsicum</span>
</div>
<!-- Add More Pill -->
<button class="snap-start shrink-0 bg-surface-container-low rounded-full px-4 py-3 flex items-center justify-center border border-dashed border-outline-variant text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- Optional AI Suggestion Context (Visual filler to show high end UI) -->
<div class="mt-4 bg-surface-container-low rounded-item-radius p-5 ambient-shadow border border-surface-variant/50 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
<div class="flex items-start gap-3 relative z-10">
<span class="material-symbols-outlined text-primary mt-0.5">auto_awesome</span>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1 text-[16px]">Perfect Match</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Looks like you have everything needed for a fresh Kadai Paneer.</p>
</div>
</div>
</div>
</section>
<!-- Spacer -->
<div class="flex-grow"></div>
<!-- Trust Badge -->
<div class="flex justify-center items-center mb-4 opacity-80">
<div class="bg-surface-container-lowest px-4 py-1.5 rounded-full flex items-center gap-2 ambient-shadow text-[11px] font-bold tracking-wider text-on-surface-variant uppercase">
<span class="w-4 h-4 rounded-full bg-primary-container flex items-center justify-center text-white text-[10px] font-bold">S</span>
                Powered by Swiggy
            </div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary font-headline-md text-headline-md py-4 rounded-full elevated-shadow flex justify-center items-center gap-2 transition-transform active:scale-95 hover:bg-primary-container/90">
            Find recipes
            <span class="material-symbols-outlined">arrow_forward</span>
</button>

<!-- Shared Component: BottomNavBar -->
<!-- Active State Logic applied to "Snap" since this is a scan result -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-3 bg-surface dark:bg-surface-container-highest shadow-[0_-4px_16px_0_rgba(0,0,0,0.04)] rounded-t-xl">
<!-- Tab: Today (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-surface-container-high transition-all scale-110 active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-label-caps text-label-caps">Today</span>
</button>
<!-- Tab: Snap (Active) -->
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-primary text-on-secondary-container dark:text-on-primary rounded-full px-6 py-2 hover:bg-surface-container-high transition-all scale-110 active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-weight="fill" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-label-caps text-label-caps">Snap</span>
</button>
<!-- Tab: History (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-surface-container-high transition-all scale-110 active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label-caps text-label-caps">History</span>
</button>
</nav>
