<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="px-grid-margin mt-stack-gap-sm">
<!-- Header -->
<div class="text-center mb-stack-gap-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Tuesday, 19 May</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">You're on track!</p>
</div>
<!-- Central Progress Ring -->
<div class="relative w-64 h-64 mx-auto mb-stack-gap-lg flex items-center justify-center">
<!-- Background Ring -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 120 120">
<circle class="stroke-surface-container-high" cx="60" cy="60" fill="none" r="54" stroke-width="12"></circle>
</svg>
<!-- Progress Ring (62% approx) -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 120 120">
<circle class="stroke-primary-container progress-ring__circle" cx="60" cy="60" fill="none" r="54" stroke-dasharray="339.292" stroke-dashoffset="128.93" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="text-center z-10 flex flex-col items-center">
<span class="font-display-calories text-display-calories text-on-surface leading-tight">1,240</span>
<span class="font-body-lg text-body-lg text-on-surface-variant mt-1">/ 2,000 kcal</span>
</div>
</div>
<!-- Macro Rings (Bento-style layout) -->
<div class="grid grid-cols-3 gap-3 mb-stack-gap-lg">
<!-- Protein -->
<div class="bg-surface-container-lowest rounded-item-radius p-4 flex flex-col items-center justify-center ambient-shadow">
<div class="relative w-12 h-12 mb-2">
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 40 40">
<circle class="stroke-surface-container" cx="20" cy="20" fill="none" r="16" stroke-width="4"></circle>
<!-- Using tertiary for 'Green' semantic mapping -->
<circle class="stroke-tertiary progress-ring__circle" cx="20" cy="20" fill="none" r="16" stroke-dasharray="100.5" stroke-dashoffset="30" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<span class="font-macro-number text-macro-number text-on-surface">62g</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">Protein</span>
</div>
<!-- Carbs -->
<div class="bg-surface-container-lowest rounded-item-radius p-4 flex flex-col items-center justify-center ambient-shadow">
<div class="relative w-12 h-12 mb-2">
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 40 40">
<circle class="stroke-surface-container" cx="20" cy="20" fill="none" r="16" stroke-width="4"></circle>
<!-- Using primary for 'Amber' semantic mapping -->
<circle class="stroke-primary progress-ring__circle" cx="20" cy="20" fill="none" r="16" stroke-dasharray="100.5" stroke-dashoffset="40" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<span class="font-macro-number text-macro-number text-on-surface">148g</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">Carbs</span>
</div>

<div class="relative w-12 h-12 mb-2">
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 40 40">
<circle class="stroke-surface-container" cx="20" cy="20" fill="none" r="16" stroke-width="4"></circle>
<!-- Using secondary for 'Purple' semantic mapping -->
<circle class="stroke-secondary progress-ring__circle" cx="20" cy="20" fill="none" r="16" stroke-dasharray="100.5" stroke-dashoffset="60" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<span class="font-macro-number text-macro-number text-on-surface">48g</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">Fat</span>
</div>
</div>
<!-- Meals Section -->
<section>
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-gap-md">Today's meals</h3>
<div class="flex flex-col gap-stack-gap-sm">
<!-- Card 1 -->
<div class="bg-surface-container-lowest rounded-item-radius p-3 flex items-center gap-4 ambient-shadow">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0">
<img alt="Poha" class="w-full h-full object-cover" data-alt="A close-up, high-quality photograph of a bowl of fresh Indian Poha. The dish is vividly yellow, garnished with green coriander, peanuts, and a slice of lemon. The lighting is bright and warm, creating a welcoming, appetizing, and modern aesthetic on a clean white surface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBba6ALEpdD1XlabmyjOwj3Gcou58MzEKrEdUF6tfwT68WGwWNty8wCVbVG6Sums7ZyMJa7Q2z1U1EjFeKtY86JsjetaPiBS0tdce6_mz36xpbQj6YOd-06u9ERm_1h7PnE-w9KhGXHBxhNRzVKpzWALMk1oHGK36Or9WLWH4Nupu1VtkvCQTpwExFJk57qQ2uuuXc1FA9eGJWxgWk8NqjgkyiSdKBC8rJF3xTYxNJWpTePOrZ8D4iR0rPQ4JQoZPLBDytmY05JvI0"/>
</div>
<div class="flex-grow flex flex-col justify-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">BREAKFAST • 8:42 AM</span>
<span class="font-headline-md text-headline-md text-on-surface">Poha</span>
</div>
<div class="text-right">
<span class="font-macro-number text-macro-number text-primary-container">280</span>
<span class="font-label-caps text-label-caps text-on-surface-variant block">kcal</span>
</div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest rounded-item-radius p-3 flex items-center gap-4 ambient-shadow">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0">
<img alt="Dal and Rice" class="w-full h-full object-cover" data-alt="A top-down view of a modern, minimalist white bowl containing a comforting portion of Indian Dal and white rice. The rich yellow of the lentils contrasts warmly with the stark white rice. The lighting is soft and diffused, emphasizing a clean, homestyle, and healthy dietary choice." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBrbhqMvTnjDo_Ii6qSnh9P_xZoLzMMCyP3L6dfISEE0b5nFLArh4hEyeWLy5lybq6sN7ICujEcc0tLDU8t5zvm1nst4j-YLXApKR9D7st4Hx7eSyzGiy9EefGMOs2kdxv52ULww27AytjpeHnWOW_Fd1YRdskCArsHh1wMboVCsNn4-LSUKX8bEMhFuHK88-Xg8_hl9MgWhPdN-f4S60MXuvsmmslrQijoZypKevQnDL1b8WNPNRdy9FzrKuEa4MgZFz6hMR6SPg"/>
</div>

<span class="font-headline-md text-headline-md text-on-surface">Dal + Rice</span>
</div>
<div class="text-right">
<span class="font-macro-number text-macro-number text-primary-container">520</span>
<span class="font-label-caps text-label-caps text-on-surface-variant block">kcal</span>
</div>
</div>
</div>
</section>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-3 bg-surface shadow-[0_-4px_16px_0_rgba(0,0,0,0.04)] rounded-t-xl md:hidden">
